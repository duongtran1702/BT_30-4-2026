<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Thêm mới nhân viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 min-h-screen py-10">

<div class="max-w-2xl mx-auto bg-white shadow-lg rounded-lg p-8">
    <div class="flex items-center justify-between mb-6">
        <h2 class="text-2xl font-bold text-gray-800">Thêm nhân viên mới</h2>
        <a th:href="@{/}" class="text-sm text-blue-600 hover:underline">&larr; Quay lại danh sách</a>
    </div>

    <form th:action="@{/add}" th:object="${employee}" method="post" enctype="multipart/form-data" class="space-y-5">

        <!-- Họ tên -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="name">Họ và tên</label>
            <input type="text" th:field="*{name}" required id="name"
                   class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500"
                   placeholder="Nhập họ tên nhân viên">
        </div>

        <div class="grid grid-cols-2 gap-4">
            <!-- Tuổi -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="age">Tuổi</label>
                <input type="number" th:field="*{age}" required min="18" id="age"
                       class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
            </div>

            <!-- Trạng thái -->
            <div>
                <label class="block text-sm font-medium text-gray-700 mb-1" for="status">Trạng thái</label>
                <select id="status" th:field="*{status}"
                        class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                    <option value="1">Đang làm việc</option>
                    <option value="0">Nghỉ việc</option>
                </select>
            </div>
        </div>

        <!-- Chọn Phòng ban (Query từ DB) -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1" for="department">Phòng ban</label>
            <select th:field="*{department.id}" required id="department"
                    class="w-full px-4 py-2 border border-gray-300 rounded-md focus:ring-blue-500 focus:border-blue-500">
                <option value="">-- Chọn phòng ban --</option>
                <option th:each="dept : ${departments}"
                        th:value="${dept.id}"
                        th:text="${dept.name}"></option>
            </select>
        </div>

        <!-- Upload Ảnh đại diện -->
        <div>
            <label class="block text-sm font-medium text-gray-700 mb-1">Ảnh đại diện</label>
            <div class="mt-1 flex items-center">
                <input type="file" name="file" accept="image/*"
                       class="block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded-full file:border-0 file:text-sm file:font-semibold file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
            </div>
            <p class="mt-1 text-xs text-gray-400">Định dạng: JPG, PNG, GIF.</p>
        </div>

        <!-- Nút bấm -->
        <div class="pt-4">
            <button type="submit"
                    class="w-full bg-blue-600 text-white font-bold py-2 px-4 rounded-md hover:bg-blue-700 transition duration-200">
                Lưu Nhân Viên
            </button>
        </div>
    </form>
</div>

</body>
</html>
