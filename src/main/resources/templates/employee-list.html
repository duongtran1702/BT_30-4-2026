<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách nhân viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 py-10 px-4 sm:px-6 lg:px-8">

<div class="max-w-6xl mx-auto">
    <!-- Khu vực Header: Tiêu đề và Nút Thêm -->
    <div class="flex justify-between items-center mb-8">
        <h2 class="text-3xl font-bold text-gray-800">
            Danh sách nhân viên
        </h2>
        <a th:href="@{/add}"
           class="inline-flex items-center px-4 py-2 bg-indigo-600 border border-transparent rounded-md font-semibold text-sm text-white uppercase tracking-widest hover:bg-indigo-700 active:bg-indigo-900 focus:outline-none focus:border-indigo-900 focus:ring ring-indigo-300 disabled:opacity-25 transition ease-in-out duration-150">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4" />
            </svg>
            Thêm nhân viên
        </a>
    </div>

    <div class="overflow-hidden bg-white shadow-md rounded-lg">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-800 text-white">
            <tr>
                <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider">ID</th>
                <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider">Ảnh</th>
                <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider">Họ tên</th>
                <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider">Tuổi</th>
                <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider">Phòng ban</th>
                <th class="px-6 py-4 text-left text-sm font-semibold uppercase tracking-wider">Trạng thái</th>
            </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
            <tr th:each="emp : ${employees}" class="hover:bg-gray-50 transition-colors">
                <td class="px-6 py-4 whitespace-nowrap text-sm font-medium text-gray-900" th:text="${emp.id}"></td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <img class="h-12 w-12 rounded-full object-cover border-2 border-indigo-500"
                         th:src="${emp.avatar}" alt="avatar">
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-700 font-semibold" th:text="${emp.name}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${emp.age}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500">
                            <span class="px-3 py-1 bg-indigo-100 text-indigo-800 rounded-full text-xs font-medium"
                                  th:text="${emp.department != null ? emp.department.name : 'Chưa có'}">
                            </span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm">
                    <span th:if="${emp.status == 1}"
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                                <span class="w-2 h-2 mr-1.5 bg-green-500 rounded-full"></span>
                                Đang làm việc
                    </span>
                    <span th:if="${emp.status == 0}"
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">
                                <span class="w-2 h-2 mr-1.5 bg-red-500 rounded-full"></span>
                                Nghỉ việc
                    </span>
                </td>
            </tr>
            </tbody>
        </table>
    </div>

    <p class="mt-4 text-center text-gray-400 text-sm">&copy; 2026 Quản lý nhân sự - Atmin System</p>
</div>

</body>
</html>
