<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Danh sách nhân viên</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 py-10 px-4 sm:px-6 lg:px-8">

<div class="max-w-6xl mx-auto">
    <div class="flex flex-col lg:flex-row justify-between items-center mb-8 gap-6">
        <h2 class="text-3xl font-bold text-gray-800 text-nowrap">Danh sách nhân viên</h2>

        <form th:action="@{/}" method="get" id="filterForm" class="flex flex-wrap items-center gap-3 w-full lg:w-auto">

            <div class="relative flex-grow min-w-[200px]">
                <input type="text" name="search" th:value="${search}" placeholder="Tìm theo tên..."
                       class="w-full pl-10 pr-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-500 text-sm outline-none">
                <div class="absolute left-3 top-2.5 text-gray-400">
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24"
                         stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                              d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"/>
                    </svg>
                </div>
            </div>

            <select name="sort" onchange="this.form.submit()"
                    class="px-3 py-2 border rounded-lg bg-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer">
                <option value="name" th:selected="${sort == 'name'}">Sắp xếp theo: Họ tên</option>
                <option value="age" th:selected="${sort == 'age'}">Sắp xếp theo: Tuổi</option>
            </select>


            <select name="direction" onchange="this.form.submit()"
                    class="px-3 py-2 border rounded-lg bg-white text-sm focus:ring-2 focus:ring-indigo-500 outline-none cursor-pointer">
                <option value="asc" th:selected="${direction == 'asc'}">Tăng dần</option>
                <option value="desc" th:selected="${direction == 'desc'}">Giảm dần</option>
            </select>

            <!-- Nút Thêm -->
            <a th:href="@{/add}"
               class="inline-flex items-center px-4 py-2 bg-indigo-600 rounded-lg font-semibold text-sm text-white uppercase hover:bg-indigo-700 transition shadow-sm">
                <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 mr-1" fill="none" viewBox="0 0 24 24"
                     stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
                </svg>
                Thêm
            </a>
        </form>
    </div>


    <div class="overflow-hidden bg-white shadow-md rounded-xl border border-gray-200">
        <table class="min-w-full divide-y divide-gray-200">
            <thead class="bg-gray-800 text-white">
            <tr>
                <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider">ID</th>
                <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider">Ảnh</th>
                <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider">Họ tên</th>
                <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider">Tuổi</th>
                <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider">Phòng ban</th>
                <th class="px-6 py-4 text-left text-xs font-semibold uppercase tracking-wider">Trạng thái</th>
            </tr>
            </thead>
            <tbody class="bg-white divide-y divide-gray-200">
            <tr th:each="emp : ${employees}" class="hover:bg-gray-50 transition-colors">
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-500" th:text="${emp.id}"></td>
                <td class="px-6 py-4 whitespace-nowrap">
                    <img class="h-10 w-10 rounded-full object-cover border-2 border-indigo-500 shadow-sm"
                         th:src="${emp.avatar}" alt="avatar">
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-800 font-semibold" th:text="${emp.name}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600" th:text="${emp.age}"></td>
                <td class="px-6 py-4 whitespace-nowrap text-sm text-gray-600">
                    <span class="px-2.5 py-1 bg-indigo-50 text-indigo-700 rounded-md text-xs font-medium border border-indigo-100"
                          th:text="${emp.department != null ? emp.department.name : 'Chưa có'}">
                    </span>
                </td>
                <td class="px-6 py-4 whitespace-nowrap text-sm">
                    <span th:if="${emp.status == 1}"
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">
                        <span class="w-2 h-2 mr-1.5 bg-green-500 rounded-full"></span> Đang làm việc
                    </span>
                    <span th:if="${emp.status == 0}"
                          class="inline-flex items-center px-2.5 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">
                        <span class="w-2 h-2 mr-1.5 bg-red-500 rounded-full"></span> Nghỉ việc
                    </span>
                </td>
            </tr>
            <tr th:if="${#lists.isEmpty(employees)}">
                <td colspan="6" class="px-6 py-10 text-center text-gray-500 italic">Không tìm thấy nhân viên nào phù
                    hợp.
                </td>
            </tr>
            </tbody>
        </table>
    </div>


    <div th:if="${totalPages > 0}" class="flex justify-center mt-8">
        <nav class="inline-flex shadow-sm rounded-lg overflow-hidden border border-gray-200">

            <a th:href="@{/(page=${currentPage - 1}, search=${search}, sort=${sort}, direction=${direction})}"
               th:if="${currentPage > 0}"
               class="px-4 py-2 bg-white text-gray-500 hover:bg-gray-50 transition border-r">
                Prev
            </a>


            <th:block th:each="i : ${#numbers.sequence(0, totalPages - 1)}">
                <a th:href="@{/(page=${i}, search=${search}, sort=${sort}, direction=${direction})}"
                   th:text="${i + 1}"
                   th:classappend="${currentPage == i} ? 'bg-indigo-600 text-white' : 'bg-white text-gray-600 hover:bg-gray-50'"
                   class="px-4 py-2 transition border-r last:border-r-0 font-medium">
                </a>
            </th:block>


            <a th:href="@{/(page=${currentPage + 1}, search=${search}, sort=${sort}, direction=${direction})}"
               th:if="${currentPage < totalPages - 1}"
               class="px-4 py-2 bg-white text-gray-500 hover:bg-gray-50 transition">
                Next
            </a>
        </nav>
    </div>

    <p class="mt-12 text-center text-gray-400 text-xs tracking-widest uppercase">&copy; 2026 Quản lý nhân sự - Atmin
        System</p>
</div>

</body>
</html>
